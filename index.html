<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>颜色</title>
    <link rel="stylesheet" href="playground.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="topbar-left">
          <div class="topbar-title">颜色</div>
        </div>
        <div class="topbar-right">
          <button class="icon-btn" id="exportBtn" type="button" aria-label="导出">
            <i class="ri-upload-2-line"></i>
          </button>
          <button class="icon-btn" id="uiThemeToggle" type="button" aria-label="切换主题">
            <i class="ri-moon-line" id="uiThemeIcon"></i>
          </button>
        </div>
      </header>

      <main class="layout">
        <aside class="sidebar">
          <div class="sidebar-controls">
            <div class="segmented" role="tablist" aria-label="模式切换">
              <button class="segmented-btn is-active" id="modeLight" type="button">亮色模式</button>
              <button class="segmented-btn" id="modeDark" type="button">暗色模式</button>
            </div>
            <button class="btn btn-secondary" id="addColorBtn" type="button">
              <i class="ri-add-line"></i>
              添加颜色
            </button>
            <div class="select-wrap">
              <span class="select-prefix mono">格式</span>
              <select class="select" id="formatSelect">
                <option value="hex" selected>HEX</option>
                <option value="rgb">RGB</option>
                <option value="hsl">HSL</option>
              </select>
            </div>
            <div class="range-wrap">
              <div class="range-label">输出数量</div>
              <div class="range-row">
                <input class="range" id="stepsRange" type="range" min="1" max="24" step="1" value="10" />
                <div class="range-value mono" id="stepsValue">10</div>
              </div>
            </div>
            <div class="range-wrap">
              <div class="range-label">曲线</div>
              <div class="range-row">
                <input class="range" id="curveRange" type="range" min="0.5" max="2.5" step="0.05" value="1" />
                <div class="range-value mono" id="curveValue">1.00</div>
              </div>
            </div>
            <div class="range-wrap">
              <div class="range-label range-label-row">
                <span>黄色保护</span>
                <label class="check">
                  <input type="checkbox" id="yellowProtectToggle" />
                  <span>启用</span>
                </label>
              </div>
            </div>
          </div>

          <div class="palette-list" id="paletteList"></div>
        </aside>
      </main>
    </div>

    <div class="toast" id="toast"></div>

    <dialog class="dialog" id="addDialog">
      <div class="dialog-head">
        <div class="dialog-title">添加颜色到色卡</div>
        <button class="icon-btn" id="addDialogClose" type="button" aria-label="关闭">
          <i class="ri-close-line"></i>
        </button>
      </div>
      <div class="dialog-body">
        <div class="form">
          <div class="field">
            <label>模式</label>
            <div class="segmented" role="tablist" aria-label="添加模式">
              <button class="segmented-btn is-active" id="addModePalette" type="button">颜色</button>
              <button class="segmented-btn" id="addModeNeutral" type="button">中性色</button>
            </div>
          </div>
          <div class="field">
            <label>颜色</label>
            <div class="field-row" id="addPaletteFields">
              <input class="color" type="color" id="addColorPicker" value="#f2502c" />
              <input class="input mono" type="text" id="addColorText" value="#F2502C" />
            </div>
            <div class="is-hidden" id="addMixWrap">
              <div class="field-row">
                <input class="color" type="color" id="addMixPicker" value="#165dff" />
                <input class="input mono" type="text" id="addMixText" value="#165DFF" />
              </div>
              <div class="range-row">
                <input class="range" id="addMixRange" type="range" min="0" max="1" step="0.01" value="0.15" />
                <div class="range-value mono" id="addMixValue">0.15</div>
              </div>
            </div>
            <div class="is-hidden" id="addNeutralFields">
              <div class="neutral-row">
                <input class="color" type="color" id="addNeutralStartPicker" value="#ffffff" />
                <input class="input mono" type="text" id="addNeutralStartText" value="#FFFFFF" />
              </div>
              <div class="neutral-row">
                <input class="color" type="color" id="addNeutralEndPicker" value="#000000" />
                <input class="input mono" type="text" id="addNeutralEndText" value="#000000" />
              </div>
            </div>
          </div>
          <div class="field">
            <label>色卡名称</label>
            <input class="input" type="text" id="addName" placeholder="例如 theme-color" />
          </div>
          <div class="field" id="addMixField">
            <label>混入颜色</label>
            <div class="range-label range-label-row">
              <span class="mono"></span>
              <label class="check">
                <input type="checkbox" id="addMixEnabled" />
                <span>启用</span>
              </label>
            </div>
          </div>
        </div>

        <div class="dialog-section">
          <div class="dialog-section-title">预览效果</div>
          <div id="addPreview"></div>
        </div>
      </div>
      <div class="dialog-actions">
        <button class="btn btn-secondary" id="addCancelBtn" type="button">取消</button>
        <button class="btn" id="addConfirmBtn" type="button">添加</button>
      </div>
    </dialog>

    <dialog class="dialog" id="exportDialog">
      <div class="dialog-head">
        <div class="dialog-title" id="exportDialogTitle"></div>
        <button class="icon-btn" id="exportDialogClose" type="button" aria-label="关闭">
          <i class="ri-close-line"></i>
        </button>
      </div>
      <pre class="code mono" id="exportDialogContent"></pre>
      <div class="dialog-actions">
        <button class="btn btn-secondary" id="exportDialogCopy" type="button">
          <i class="ri-file-copy-line"></i>
          复制
        </button>
        <button class="btn" id="exportDialogOk" type="button">关闭</button>
      </div>
    </dialog>

    <script type="module">
      import { palette, neutral } from './src/index.js';

      const toastEl = document.getElementById('toast');
      const uiThemeToggle = document.getElementById('uiThemeToggle');
      const uiThemeIcon = document.getElementById('uiThemeIcon');
      const formatSelect = document.getElementById('formatSelect');
      const stepsRange = document.getElementById('stepsRange');
      const stepsValue = document.getElementById('stepsValue');
      const curveRange = document.getElementById('curveRange');
      const curveValue = document.getElementById('curveValue');
      const yellowProtectToggle = document.getElementById('yellowProtectToggle');
      const modeLight = document.getElementById('modeLight');
      const modeDark = document.getElementById('modeDark');
      const paletteListEl = document.getElementById('paletteList');

      const addDialog = document.getElementById('addDialog');
      const addDialogClose = document.getElementById('addDialogClose');
      const addModePalette = document.getElementById('addModePalette');
      const addModeNeutral = document.getElementById('addModeNeutral');
      const addPaletteFields = document.getElementById('addPaletteFields');
      const addNeutralFields = document.getElementById('addNeutralFields');
      const addColorPicker = document.getElementById('addColorPicker');
      const addColorText = document.getElementById('addColorText');
      const addMixField = document.getElementById('addMixField');
      const addMixEnabled = document.getElementById('addMixEnabled');
      const addMixWrap = document.getElementById('addMixWrap');
      const addMixPicker = document.getElementById('addMixPicker');
      const addMixText = document.getElementById('addMixText');
      const addMixRange = document.getElementById('addMixRange');
      const addMixValue = document.getElementById('addMixValue');
      const addNeutralStartPicker = document.getElementById('addNeutralStartPicker');
      const addNeutralStartText = document.getElementById('addNeutralStartText');
      const addNeutralEndPicker = document.getElementById('addNeutralEndPicker');
      const addNeutralEndText = document.getElementById('addNeutralEndText');
      const addName = document.getElementById('addName');
      const addPreview = document.getElementById('addPreview');
      const addCancelBtn = document.getElementById('addCancelBtn');
      const addConfirmBtn = document.getElementById('addConfirmBtn');

      const exportBtn = document.getElementById('exportBtn');
      const exportDialog = document.getElementById('exportDialog');
      const exportDialogTitle = document.getElementById('exportDialogTitle');
      const exportDialogContent = document.getElementById('exportDialogContent');
      const exportDialogClose = document.getElementById('exportDialogClose');
      const exportDialogOk = document.getElementById('exportDialogOk');
      const exportDialogCopy = document.getElementById('exportDialogCopy');

      let toastTimer = null;

      function toast(message, type = 'info') {
        toastEl.textContent = message;
        toastEl.dataset.type = type;
        toastEl.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1600);
      }

      async function copyText(text) {
        try {
          await navigator.clipboard.writeText(text);
          toast('已复制', 'success');
        } catch {
          toast('复制失败，请手动复制', 'error');
        }
      }

      function normalizeColor(input) {
        return String(input || '').trim();
      }

      function getSteps() {
        return Math.max(1, Math.min(24, Number(stepsRange.value) || 10));
      }

      function getFormat() {
        return formatSelect.value;
      }

      function getCurveGamma() {
        return Math.max(0.1, Math.min(5, Number(curveRange.value) || 1));
      }

      function getProtectYellow() {
        return yellowProtectToggle.checked;
      }

      function getMode() {
        return modeDark.classList.contains('is-active') ? 'dark' : 'light';
      }

      function safeGenerate(color, opts) {
        try {
          return palette.generate(color, opts);
        } catch (e) {
          toast(e?.message || '生成失败', 'error');
          return null;
        }
      }

      function safeNeutral(startGray, endGray, opts) {
        try {
          return neutral.generate(startGray, endGray, opts);
        } catch (e) {
          toast(e?.message || '生成失败', 'error');
          return null;
        }
      }

      function stripHtml(title, colors) {
        const swatches = colors
          .map((c, idx) => {
            const v = String(c);
            return `
              <button class="strip-swatch" type="button" data-color="${v}" style="background:${v}">
                <span class="strip-index">${idx + 1}</span>
              </button>
            `;
          })
          .join('');

        return `
          <div class="strip">
            <div class="strip-head">
              <div class="strip-title">${title}</div>
              <div class="strip-meta mono">${colors.length} steps</div>
            </div>
            <div class="strip-scroll">
              <div class="strip-row" style="grid-template-columns: repeat(${colors.length}, minmax(24px, 1fr));">
                ${swatches}
              </div>
            </div>
          </div>
        `;
      }

      function paletteItemHtml(item, colors) {
        const seed = item.color.toUpperCase();
        const len = colors.light.length;
        const swatches = colors.light
          .map((c, idx) => {
            const v = String(c);
            return `
              <button class="mini-swatch" type="button" data-color="${v}" style="background:${v}">
                <span class="mini-index">${idx + 1}</span>
              </button>
            `;
          })
          .join('');
        const swatchesDark = colors.dark
          .map((c, idx) => {
            const v = String(c);
            return `
              <button class="mini-swatch" type="button" data-color="${v}" style="background:${v}">
                <span class="mini-index">${idx + 1}</span>
              </button>
            `;
          })
          .join('');

        return `
          <div class="palette-item" data-id="${item.id}">
            <div class="palette-item-head">
              <div class="palette-seed" style="background:${seed}"></div>
              <div class="palette-meta">
                <div class="palette-name">${item.name}</div>
                <div class="palette-hex mono">${seed}</div>
              </div>
              <button class="icon-btn icon-btn-ghost palette-more" type="button" data-action="remove" aria-label="移除">
                <i class="ri-delete-bin-6-line"></i>
              </button>
            </div>
            <div class="mini-scroll">
              <div class="mini-row" style="grid-template-columns: repeat(${len}, minmax(24px, 1fr));">
                ${swatches}
              </div>
            </div>
            <div class="mini-scroll">
              <div class="mini-row" style="grid-template-columns: repeat(${len}, minmax(24px, 1fr));">
                ${swatchesDark}
              </div>
            </div>
          </div>
        `;
      }

      function neutralItemHtml(config, colors) {
        const len = colors.light.length;
        const mixMeta = config.mixColor && Number(config.mixRatio) > 0 ? ` · mix ${String(config.mixColor).toUpperCase()} ${Number(config.mixRatio).toFixed(2)}` : '';
        const swatches = colors.light
          .map((c, idx) => {
            const v = String(c);
            return `
              <button class="mini-swatch" type="button" data-color="${v}" style="background:${v}">
                <span class="mini-index">${idx + 1}</span>
              </button>
            `;
          })
          .join('');
        const swatchesDark = colors.dark
          .map((c, idx) => {
            const v = String(c);
            return `
              <button class="mini-swatch" type="button" data-color="${v}" style="background:${v}">
                <span class="mini-index">${idx + 1}</span>
              </button>
            `;
          })
          .join('');

        return `
          <div class="palette-item palette-item-neutral" data-id="${config.id}">
            <div class="palette-item-head">
              <div class="palette-seed" style="background:${config.start}"></div>
              <div class="palette-seed" style="background:${config.end}"></div>
              <div class="palette-meta">
                <div class="palette-name">${config.name}</div>
                <div class="palette-hex mono">${config.start.toUpperCase()} → ${config.end.toUpperCase()}${mixMeta}</div>
              </div>
              <button class="icon-btn icon-btn-ghost palette-more" type="button" data-action="remove" aria-label="移除">
                <i class="ri-delete-bin-6-line"></i>
              </button>
            </div>
            <div class="mini-scroll">
              <div class="mini-row" style="grid-template-columns: repeat(${len}, minmax(24px, 1fr));">
                ${swatches}
              </div>
            </div>
            <div class="mini-scroll">
              <div class="mini-row" style="grid-template-columns: repeat(${len}, minmax(24px, 1fr));">
                ${swatchesDark}
              </div>
            </div>
          </div>
        `;
      }

      function exportPayload() {
        const steps = getSteps();
        const format = getFormat();
        const curveGamma = getCurveGamma();
        const protectYellow = getProtectYellow();
        const payload = {};

        getItems().forEach((item) => {
          if (item.type === 'neutral') {
            const light = safeNeutral(item.start, item.end, { steps, format, includeEnds: true, curveGamma, mixColor: item.mixColor, mixRatio: item.mixRatio });
            const dark = safeNeutral(item.end, item.start, { steps, format, includeEnds: true, curveGamma, mixColor: item.mixColor, mixRatio: item.mixRatio });
            if (!light || !dark) return;
            payload[item.name] = { type: 'neutral', start: item.start, end: item.end, steps, format, curveGamma, mixColor: item.mixColor, mixRatio: item.mixRatio, light, dark };
            return;
          }

          const light = safeGenerate(item.color, { list: true, steps, format, curveGamma, dark: false, mixColor: item.mixColor, mixRatio: item.mixRatio, protectYellow });
          const dark = safeGenerate(item.color, { list: true, steps, format, curveGamma, dark: true, mixColor: item.mixColor, mixRatio: item.mixRatio, protectYellow });
          if (!light || !dark) return;
          payload[item.name] = { type: 'palette', seed: item.color, steps, format, curveGamma, mixColor: item.mixColor, mixRatio: item.mixRatio, protectYellow, light, dark };
        });

        return payload;
      }

      function exportCss(payload) {
        const lines = [];
        lines.push(':root {');
        Object.entries(payload).forEach(([name, v]) => {
          v.light.forEach((c, idx) => lines.push(`  --${name}-light-${idx + 1}: ${c};`));
          if (v.dark) v.dark.forEach((c, idx) => lines.push(`  --${name}-dark-${idx + 1}: ${c};`));
        });
        lines.push('}');
        return lines.join('\n');
      }

      function wireCopy(container) {
        container.querySelectorAll('[data-color]').forEach((el) => {
          el.addEventListener('click', () => copyText(el.dataset.color));
        });
      }

      const storageKey = 'aviala-color-playground-items';

      function getDefaultItems() {
        return [
          { id: 'theme-color', name: 'theme-color', type: 'palette', color: '#F2502C' },
          { id: 'green-leaf-green', name: 'green-leaf-green', type: 'palette', color: '#0D9E64' },
        ];
      }

      function getItems() {
        try {
          const raw = localStorage.getItem(storageKey);
          if (!raw) return getDefaultItems();
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed) || parsed.length === 0) return getDefaultItems();
          const normalized = parsed
            .map((x) => {
              const id = typeof x?.id === 'string' ? x.id : null;
              const name = typeof x?.name === 'string' ? x.name : null;
              if (!id || !name) return null;

              if (x?.type === 'neutral' || (typeof x?.start === 'string' && typeof x?.end === 'string')) {
                const start = typeof x?.start === 'string' ? x.start : '#ffffff';
                const end = typeof x?.end === 'string' ? x.end : '#000000';
                const mixColor = typeof x?.mixColor === 'string' ? x.mixColor : '';
                const mixRatio = typeof x?.mixRatio === 'number' ? x.mixRatio : Number(x?.mixRatio) || 0;
                return { id, name, type: 'neutral', start, end, mixColor, mixRatio };
              }

              if (typeof x?.color === 'string') {
                const mixColor = typeof x?.mixColor === 'string' ? x.mixColor : '';
                const mixRatio = typeof x?.mixRatio === 'number' ? x.mixRatio : Number(x?.mixRatio) || 0;
                return { id, name, type: 'palette', color: x.color, mixColor, mixRatio };
              }

              return null;
            })
            .filter(Boolean);
          if (normalized.length === 0) return getDefaultItems();
          return normalized;
        } catch {
          return getDefaultItems();
        }
      }

      function setItems(items) {
        localStorage.setItem(storageKey, JSON.stringify(items));
      }

      function renderList() {
        const steps = getSteps();
        const format = getFormat();
        const curveGamma = getCurveGamma();
        const protectYellow = getProtectYellow();
        const html = getItems()
          .map((item) => {
            if (item.type === 'neutral') {
              const light = safeNeutral(item.start, item.end, { steps, format, includeEnds: true, curveGamma, mixColor: item.mixColor, mixRatio: item.mixRatio });
              const dark = safeNeutral(item.end, item.start, { steps, format, includeEnds: true, curveGamma, mixColor: item.mixColor, mixRatio: item.mixRatio });
              if (!light || !dark) return '';
              return neutralItemHtml(item, { light, dark });
            }

            const light = safeGenerate(item.color, { list: true, steps, format, curveGamma, dark: false, mixColor: item.mixColor, mixRatio: item.mixRatio, protectYellow });
            const dark = safeGenerate(item.color, { list: true, steps, format, curveGamma, dark: true, mixColor: item.mixColor, mixRatio: item.mixRatio, protectYellow });
            if (!light || !dark) return '';
            return paletteItemHtml(item, { light, dark });
          })
          .filter(Boolean)
          .join('');

        paletteListEl.innerHTML = html;
        wireCopy(paletteListEl);

        paletteListEl.querySelectorAll('[data-action="remove"]').forEach((btn) => {
          btn.addEventListener('click', (e) => {
            const itemEl = e.currentTarget.closest('.palette-item');
            const id = itemEl?.dataset?.id;
            if (!id) return;
            setItems(getItems().filter((x) => x.id !== id));
            renderAll();
          });
        });

        paletteListEl.querySelectorAll('.palette-item').forEach((el) => {
          el.addEventListener('click', (e) => {
            if (e.target.closest('[data-action="remove"]')) return;
            paletteListEl.querySelectorAll('.palette-item').forEach((n) => n.classList.remove('is-active'));
            el.classList.add('is-active');
          });
        });
      }

      function openExportDialog(title, content) {
        exportDialogTitle.textContent = title;
        exportDialogContent.textContent = content;
        exportDialog.showModal();
      }

      function closeExportDialog() {
        exportDialog.close();
      }

      function applyUiTheme(theme) {
        const t = theme === 'dark' ? 'dark' : 'light';
        document.documentElement.classList.toggle('dark', t === 'dark');
        localStorage.setItem('ui-theme', t);
        uiThemeIcon.className = t === 'dark' ? 'ri-sun-line' : 'ri-moon-line';
      }

      function syncStepsUi() {
        stepsValue.textContent = String(getSteps());
      }

      function syncCurveUi() {
        curveValue.textContent = getCurveGamma().toFixed(2);
      }

      function renderAll() {
        syncStepsUi();
        syncCurveUi();
        renderList();
        const first = paletteListEl.querySelector('.palette-item');
        if (first) first.classList.add('is-active');
      }

      function openAddDialog() {
        addName.value = '';
        addMixEnabled.checked = false;
        syncMixUi();
        setAddMode('palette');
        addDialog.showModal();
        renderAddPreview();
      }

      function closeAddDialog() {
        addDialog.close();
      }

      function renderAddPreview() {
        const steps = getSteps();
        const format = getFormat();
        const curveGamma = getCurveGamma();
        const protectYellow = getProtectYellow();
        const mode = getAddMode();
        if (mode === 'neutral') {
          const mix = getAddMix();
          const start = normalizeColor(addNeutralStartText.value || addNeutralStartPicker.value);
          const end = normalizeColor(addNeutralEndText.value || addNeutralEndPicker.value);
          const light = safeNeutral(start, end, { steps, format, includeEnds: true, curveGamma, ...mix });
          const dark = safeNeutral(end, start, { steps, format, includeEnds: true, curveGamma, ...mix });
          if (!light || !dark) {
            addPreview.innerHTML = '';
            return;
          }
          addPreview.innerHTML = [stripHtml('Light', light), stripHtml('Dark', dark)].join('');
          wireCopy(addPreview);
          return;
        }

        const mix = getAddMix();
        const color = normalizeColor(addColorText.value || addColorPicker.value);
        const light = safeGenerate(color, { list: true, steps, format, curveGamma, dark: false, protectYellow, ...mix });
        const dark = safeGenerate(color, { list: true, steps, format, curveGamma, dark: true, protectYellow, ...mix });
        if (!light || !dark) {
          addPreview.innerHTML = '';
          return;
        }
        addPreview.innerHTML = [stripHtml('Light', light), stripHtml('Dark', dark)].join('');
        wireCopy(addPreview);
      }

      document.getElementById('addColorBtn').addEventListener('click', openAddDialog);
      addDialogClose.addEventListener('click', closeAddDialog);
      addCancelBtn.addEventListener('click', closeAddDialog);
      addDialog.addEventListener('click', (e) => {
        if (e.target === addDialog) closeAddDialog();
      });

      addColorPicker.addEventListener('input', (e) => {
        addColorText.value = e.target.value.toUpperCase();
        renderAddPreview();
      });
      addColorText.addEventListener('input', (e) => {
        const v = e.target.value.trim();
        if (/^#[0-9a-fA-F]{6}$/.test(v)) addColorPicker.value = v;
        renderAddPreview();
      });

      function getAddMode() {
        return addModeNeutral.classList.contains('is-active') ? 'neutral' : 'palette';
      }

      function setAddMode(next) {
        const mode = next === 'neutral' ? 'neutral' : 'palette';
        addModePalette.classList.toggle('is-active', mode === 'palette');
        addModeNeutral.classList.toggle('is-active', mode === 'neutral');
        addPaletteFields.classList.toggle('is-hidden', mode !== 'palette');
        addNeutralFields.classList.toggle('is-hidden', mode !== 'neutral');
        addMixField.classList.toggle('is-hidden', false);
        addMixWrap.classList.toggle('is-hidden', !addMixEnabled.checked);
        renderAddPreview();
      }

      addModePalette.addEventListener('click', () => setAddMode('palette'));
      addModeNeutral.addEventListener('click', () => setAddMode('neutral'));

      function syncMixUi() {
        addMixValue.textContent = Number(addMixRange.value || 0).toFixed(2);
        addMixWrap.classList.toggle('is-hidden', !addMixEnabled.checked);
      }

      function getAddMix() {
        if (!addMixEnabled.checked) return {};
        const mixColor = normalizeColor(addMixText.value || addMixPicker.value);
        if (!/^#[0-9a-fA-F]{6}$/.test(mixColor)) return {};
        const mixRatio = Math.max(0, Math.min(1, Number(addMixRange.value) || 0));
        if (!mixRatio) return {};
        return { mixColor, mixRatio };
      }

      addMixEnabled.addEventListener('change', () => {
        syncMixUi();
        renderAddPreview();
      });
      addMixPicker.addEventListener('input', (e) => {
        addMixText.value = e.target.value.toUpperCase();
        renderAddPreview();
      });
      addMixText.addEventListener('input', (e) => {
        const v = e.target.value.trim();
        if (/^#[0-9a-fA-F]{6}$/.test(v)) addMixPicker.value = v;
        renderAddPreview();
      });
      addMixRange.addEventListener('input', () => {
        syncMixUi();
        renderAddPreview();
      });

      addNeutralStartPicker.addEventListener('input', (e) => {
        addNeutralStartText.value = e.target.value.toUpperCase();
        renderAddPreview();
      });
      addNeutralEndPicker.addEventListener('input', (e) => {
        addNeutralEndText.value = e.target.value.toUpperCase();
        renderAddPreview();
      });
      addNeutralStartText.addEventListener('input', (e) => {
        const v = e.target.value.trim();
        if (/^#[0-9a-fA-F]{6}$/.test(v)) addNeutralStartPicker.value = v;
        renderAddPreview();
      });
      addNeutralEndText.addEventListener('input', (e) => {
        const v = e.target.value.trim();
        if (/^#[0-9a-fA-F]{6}$/.test(v)) addNeutralEndPicker.value = v;
        renderAddPreview();
      });

      addConfirmBtn.addEventListener('click', () => {
        const name = String(addName.value || '').trim();
        if (!name) {
          toast('请输入色卡名称', 'error');
          return;
        }
        const id = name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9\-_]/g, '').slice(0, 48) || `color-${Date.now()}`;
        const next = getItems().filter((x) => x.id !== id);
        const mode = getAddMode();
        if (mode === 'neutral') {
          const start = normalizeColor(addNeutralStartText.value || addNeutralStartPicker.value);
          const end = normalizeColor(addNeutralEndText.value || addNeutralEndPicker.value);
          if (!/^#[0-9a-fA-F]{6}$/.test(start) || !/^#[0-9a-fA-F]{6}$/.test(end)) {
            toast('请输入有效 HEX 颜色', 'error');
            return;
          }
          const mix = getAddMix();
          next.unshift({ id, name, type: 'neutral', start: start.toUpperCase(), end: end.toUpperCase(), mixColor: mix.mixColor, mixRatio: mix.mixRatio });
        } else {
          const color = normalizeColor(addColorText.value || addColorPicker.value);
          if (!/^#[0-9a-fA-F]{6}$/.test(color)) {
            toast('请输入有效 HEX 颜色', 'error');
            return;
          }
          const mix = getAddMix();
          next.unshift({ id, name, type: 'palette', color: color.toUpperCase(), mixColor: mix.mixColor, mixRatio: mix.mixRatio });
        }
        setItems(next);
        closeAddDialog();
        renderAll();
        toast('已添加', 'success');
      });

      exportDialogClose.addEventListener('click', closeExportDialog);
      exportDialogOk.addEventListener('click', closeExportDialog);
      exportDialog.addEventListener('click', (e) => {
        if (e.target === exportDialog) closeExportDialog();
      });
      exportDialogCopy.addEventListener('click', () => copyText(exportDialogContent.textContent || ''));

      exportBtn.addEventListener('click', () => {
        const payload = exportPayload();
        openExportDialog('导出（JSON）', JSON.stringify(payload, null, 2));
      });

      formatSelect.addEventListener('change', () => {
        renderAll();
        if (addDialog.open) renderAddPreview();
      });
      stepsRange.addEventListener('input', () => {
        renderAll();
        if (addDialog.open) renderAddPreview();
      });
      curveRange.addEventListener('input', () => {
        renderAll();
        if (addDialog.open) renderAddPreview();
      });
      yellowProtectToggle.addEventListener('change', () => {
        renderAll();
        if (addDialog.open) renderAddPreview();
      });

      modeLight.addEventListener('click', () => {
        modeLight.classList.add('is-active');
        modeDark.classList.remove('is-active');
        renderAll();
      });
      modeDark.addEventListener('click', () => {
        modeDark.classList.add('is-active');
        modeLight.classList.remove('is-active');
        renderAll();
      });

      uiThemeToggle.addEventListener('click', () => applyUiTheme(document.documentElement.classList.contains('dark') ? 'light' : 'dark'));

      applyUiTheme(localStorage.getItem('ui-theme') || 'light');
      renderAll();
    </script>
  </body>
</html>
