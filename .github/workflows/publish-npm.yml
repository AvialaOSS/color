name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm i -g npm@^11.5.1
      - run: node -v && npm -v
      - run: npm ci --include=optional
      - name: Ensure Rollup native binary (Linux)
        run: |
          node -e "require('@rollup/rollup-linux-x64-gnu')"
        continue-on-error: true
      - name: Repair Rollup native binary (if missing)
        run: |
          node -e "require('@rollup/rollup-linux-x64-gnu')" && exit 0
          ROLLUP_VERSION=$(node -p "require('./package-lock.json')?.packages?.['node_modules/rollup']?.version || require('./package-lock.json')?.dependencies?.rollup?.version || ''")
          if [ -z \"$ROLLUP_VERSION\" ]; then
            ROLLUP_VERSION=$(node -e "const fs=require('fs');const p='node_modules/rollup/package.json';console.log(fs.existsSync(p)?JSON.parse(fs.readFileSync(p,'utf8')).version:'')")
          fi
          npm i --no-save "@rollup/rollup-linux-x64-gnu@${ROLLUP_VERSION}"
          node -e "require('@rollup/rollup-linux-x64-gnu')"
      - run: npm test
      - name: Verify package exists and trusted publisher is configured
        run: |
          npm view @aviala-design/color version >/dev/null 2>&1 && exit 0
          echo "npm cannot find @aviala-design/color in the registry."
          echo "If this is the first publish, you usually need to create the package first (manual publish once),"
          echo "then configure Trusted Publishers for this package/scope and re-run the Release."
          exit 1
      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) does not match tag ($GITHUB_REF_NAME)"
            exit 1
          fi
      - run: npm publish --access public --provenance
