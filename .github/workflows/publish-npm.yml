name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci --include=optional
      - name: Ensure Rollup native binary (Linux)
        run: |
          node -e "require('@rollup/rollup-linux-x64-gnu')"
        continue-on-error: true
      - name: Repair Rollup native binary (if missing)
        run: |
          node -e "require('@rollup/rollup-linux-x64-gnu')" && exit 0
          ROLLUP_VERSION=$(node -p "require('rollup/package.json').version")
          npm i --no-save "@rollup/rollup-linux-x64-gnu@${ROLLUP_VERSION}"
      - run: npm test
      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) does not match tag ($GITHUB_REF_NAME)"
            exit 1
          fi
      - run: npm publish --access public --provenance
